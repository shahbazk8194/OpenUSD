name: BuildUSDClone

on:
  workflow_dispatch:

jobs:
  GetUser:
    runs-on: ubuntu-20.04
    timeout-minutes: 5
    outputs:
      require-result: ${{ steps.check.outputs.require-result }}
      check-result: ${{ steps.check.outputs.check-result }}
    steps:
      - name: CheckPermissions
        uses: actions-cool/check-user-permission@v2
        id: UserPermission
        with:
          require: 'write'
          username: ${{ github.triggering_actor }}
      - name: PrintPermissions
        run: |
          echo "The user: ${{ github.triggering_actor }}"
          echo "The permissions: ${{ steps.UserPermission.outputs.user-permission }}"

  GetGitRef:
    runs-on: ubuntu-20.04
    timeout-minutes: 5
    needs:
      - GetUser
    outputs:
      ref: ${{ steps.setter.outputs.ref }}
    steps:
      - name: Get push ref
        if: ${{ github.event_name == 'push' }}
        run: |
          echo "REF=${{ github.ref }}" >> $GITHUB_ENV
      - name: Get PR ref
        if: ${{ github.event.issue.pull_request }}
        run: |
          echo "REF=refs/pull/${{ github.event.issue.number }}/merge" >> $GITHUB_ENV
      - name: Print ENV_VAR
        run: |
          echo "The value of REF is $REF"
      - name: Set ENV_VAR
        id: setter
        run: |
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
      - name: Print GITHUB_ENV var
        run: |
          echo "$GITHUB_ENV"
      - name: Print GITHUB_OUTPUT var
        run: |
          echo "$GITHUB_OUTPUT"
